<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Нет соединения</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #eef2ff;
        color: #0f172a;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(99, 102, 241, 0.18);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 18px 18px;
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        letter-spacing: -0.01em;
      }
      p {
        margin: 8px 0;
        font-size: 14px;
        line-height: 1.45;
        color: rgba(15, 23, 42, 0.8);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(99, 102, 241, 0.25);
        background: white;
        border-radius: 14px;
        padding: 10px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
      .muted { opacity: 0.85; font-size: 12px; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Не удалось открыть приложение</h1>
        <p>
          Похоже, сейчас нет интернета или сервер недоступен.
        </p>
        <p>
          Проверь сеть (Wi‑Fi/мобильные данные) и попробуй ещё раз.
        </p>
        <div class="row">
          <button onclick="location.reload()">Повторить</button>
        </div>
        <p class="muted">
          Если проблема не исчезает — проверь, что в <code>capacitor.config.ts</code> указан правильный <code>server.url</code>.
        </p>
      </div>
    </div>
  </body>
</html>
